{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block titulo %}
Criar Conta
{% endblock %}

{% block head %}

<style>
    .form-text{
    color:#C9C9C9BF;
    }


@media (max-width: 600px) {
      .formcriar{
        padding:0px 30px;
      }
    }
</style>

{% endblock %}

{% block content %}

    <header class="min-h-screen bg-black bg-opacity-75 bg-blend-overlay showcase border-gray-600 border-b-8 flex justify-center items-center bg-no-repeat"  style="background-image: url('{% static 'img/background_netflix.jpg' %}');">
        <div class="z-10 h-full py-32 md:py-0 text-gray-100 text-center flex items-center flex-col">
            <form method="post"  class="formcriar" >
               {% csrf_token %}
                <fieldset class="form-group">
                    <legend class="border-bottom mb-4">Crie uma conta para continuar</legend>
                   {{ form|crispy }}
                </fieldset>
                <button class="bg-red-600 py-1 px-3 text-white w-full md:text-lg rounded-md" type="submit">Criar Conta</button>
            </form>
        </div>
    </header>

   <footer class=" px-2 md:px-5 py-10 ">
        <ul class="flex items-center justify-center md:justify-center">

            <li class="mr-1 md:mr-1 ">&copy; 2021</li>
            <li> Feito com Python (Django)</li>

        </ul>
    </footer>

{% endblock %}
